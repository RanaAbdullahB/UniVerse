<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f1b2d" />
    <meta name="description" content="University Student Portal - Your campus, connected" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <title>UniVerse — Student Gateway</title>
    <script>
  (function() {
    var theme = localStorage.getItem('universe-theme');
    if (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches) theme = 'dark';
    if (theme) document.documentElement.setAttribute('data-theme', theme);
  })();
</script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
